<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/falcon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <!-- يطبّق الوضع قبل رسم الصفحة — يجب أن يطابق STORAGE_KEY في ThemeContext ('saqer-theme') -->
    <script>
      (function () {
        try {
          var k = 'saqer-theme'
          var v = localStorage.getItem(k)
          var root = document.documentElement
          var dark
          if (v === 'light') {
            root.classList.remove('dark')
            dark = false
          } else if (v === 'dark') {
            root.classList.add('dark')
            dark = true
          } else {
            root.classList.add('dark')
            dark = true
          }
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta)
            meta.setAttribute('content', dark ? '#000000' : '#ffffff')
        } catch (e) {}
      })()
    </script>
    <meta name="description" content="متجر الصقر — مستلزمات التخييم." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>متجر الصقر</title>
  </head>
  <body class="h-full bg-white text-reno-900 dark:bg-black dark:text-reno-50">
    <div id="root" class="min-h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
